<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>DSA_TRACKER</title>
  <style>
    body {
      background: linear-gradient(#f8f8fc, #292961);
      height: 100vh;
      /* full viewport height */
      display: flex;
      /* enable flexbox */
      flex-direction: column;
      /* stack title + form vertically */
      justify-content: center;
      /* center vertically */
      align-items: center;
    }

    .form-container {
      background: rgb(242, 242, 244);
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(240, 237, 237, 0.1);
    }

    label {
      display: block;
      margin-top: 10px;
      margin-right: 10px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-right: 5px;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    h2 {
      padding: 5px;
    }

    a {
      color: #0c0d0d;
    }

    h1 {
      font-size: 50px;
      align-items: center;
      align-content: center;
      font-style: italic;
      font-size: 3pc;
      color: #020258;
      margin-bottom: 30px;
      text-align: center;
    }

    .logo {

      display: flex;
      align-items: center;
      gap: 10px;

      margin-bottom: 35px;
    }

    .logo i {

      font-size: 32px;
      color: #090a0d;

    }

    .logo h2 {

      font-size: 50px;
      font-weight: 700;

    }
    .error {
  color: red;
  font-weight: bold;
  margin-bottom: 10px;
}
.success {
  color: green;
  font-weight: bold;
  margin-bottom: 10px;
}

  </style>
</head>

<body>

  <div class="logo">
    <i class="fa-solid fa-code"></i>
    <h2>DSA_TRACKER</h2>
  </div>

  <div class="form-container">
    <!-- Flash messages block -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    
    <form method="POST" action="/user/login">
      <h2>Login</h2>
      <label>Username:</label>
      <input type="text" name="username" placeholder="Enter your full name" required>

      <label>Password:</label>
      <input type="password" name="password" placeholder="Enter valid Password" required>

      <button type="submit">Submit</button>
      New User: <a href="/user/register"><i>register</i></a>
    </form>
  </div>
  
</body>

</html>
