<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #38393a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 500px;
            background: rgb(245, 240, 240);
            padding: 100px;
            padding-left: 20px;
            padding-right: 10px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, .2);
        }

        h1,
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        pre{
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
            /* Wrap long lines */
            word-wrap: break-word;
            overflow-x: auto;
            /* Horizontal scroll if needed */
            font-family: Consolas, monospace;
        }
    </style>

</head>

<body>
    <div class="container">
        <form>
            <h1>📒Notes:</h1>
            {% for problem in problems %}
                {% if problem=='title' %}
                    <h2><i>{{problems[problem]}}</i></h2>
                {% endif %}
            {% endfor %}
            <br>
            {% for problem in problems %}
                <h3>{% if problem=='notes' %}
                    <pre>{{problems[problem]}}</pre>
                {% endif %}</h3>
            {% endfor %}
        </form>
    </div>
</body>

</html>
