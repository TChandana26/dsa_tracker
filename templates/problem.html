<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Problem</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:500px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 15px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:15px;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            margin-top:25px;
            padding:12px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#388E3C;
        }

    </style>

</head>
<body>

<div class="container">

<h2>Add DSA Problem</h2>

<form method="POST" action="{{ url_for('problem.add_problem') }}">

<label>Problem Title</label>
<input
type="text"
name="title"
placeholder="Enter Problem Name"
required>

<label>Platform</label>

<select name="platform" required>

<option value="">Select Platform</option>

<option>LeetCode</option>

<option>CodeChef</option>

<option>Codeforces</option>

<option>GeeksforGeeks</option>

<option>HackerRank</option>

</select>

<label>Difficulty</label>

<select name="difficulty" required>

<option value="">Select Difficulty</option>

<option>Easy</option>

<option>Medium</option>

<option>Hard</option>

</select>

<label>Problem Link</label>

<input
type="url"
name="link"
placeholder="https://leetcode.com/problems/two-sum">

<label>Notes</label>

<textarea
name="notes"
rows="4"
placeholder="Write Notes..."></textarea>

<button type="submit">
Save Problem
</button>

</form>

</div>

</body>
</html>
